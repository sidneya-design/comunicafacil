<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunica PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e0e0e0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <!-- Barra Lateral (Sidebar) -->
        <nav class="sidebar">
            <button class="nav-btn active" data-view="view-core">
                <i class="fas fa-border-all"></i>
                <span>Essenciais</span>
            </button>
            <button class="nav-btn" data-view="view-quick">
                <i class="fas fa-bolt"></i>
                <span>Rápidas</span>
            </button>
            <button class="nav-btn" data-view="view-topics">
                <i class="fas fa-folder-open"></i>
                <span>Tópicos</span>
            </button>
            <button class="nav-btn" data-view="view-virtues">
                <i class="fas fa-star"></i>
                <span>Forças</span>
            </button>
            <button class="nav-btn" data-view="view-keyboard">
                <i class="fas fa-keyboard"></i>
                <span>Teclado</span>
            </button>
            <button class="nav-btn" data-view="view-media">
                <i class="fas fa-play-circle"></i>
                <span>Mídias</span>
            </button>
            <button class="nav-btn" data-view="view-exercises">
                <i class="fas fa-dumbbell"></i>
                <span>Exercícios</span>
            </button>
        </nav>

        <div class="main-content">
            <!-- Barra de Mensagem (Fixa no topo) -->
            <header class="message-bar">
                <div class="message-display" id="message-display"></div>
                <div class="message-actions">
                    <button id="btn-backspace" class="action-btn backspace-btn" title="Apagar última palavra">
                        <i class="fas fa-delete-left"></i>
                    </button>
                    <button id="btn-speak" class="action-btn speak-btn" title="Falar frase completa">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button id="btn-clear" class="action-btn clear-btn" title="Apagar tudo">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </header>

            <!-- Container de Telas (Views) -->
            <div class="views-container">
                <!-- Tela: Palavras Essenciais -->
                <main class="view-section active" id="view-core">
                    <div class="grid-container" id="grid-core"></div>
                </main>

                <!-- Tela: Respostas Rápidas -->
                <main class="view-section" id="view-quick">
                    <div class="grid-container" id="grid-quick"></div>
                </main>

                <!-- Tela: Tópicos (Fringe) -->
                <main class="view-section" id="view-topics">
                    <div class="grid-container" id="grid-topics-folders"></div>
                    <div class="topic-content" id="topic-content-area" style="display: none;">
                        <button class="back-btn" id="btn-topic-back">
                            <i class="fas fa-arrow-left"></i> Voltar para Tópicos
                        </button>
                        <div class="grid-container" id="grid-topic-words"></div>
                    </div>
                </main>

                <!-- Tela: Virtudes (VIA Strengths) -->
                <main class="view-section" id="view-virtues">
                    <div class="grid-container" id="grid-virtues-folders"></div>
                    <div class="topic-content" id="virtue-content-area" style="display: none;">
                        <button class="back-btn" id="btn-virtue-back">
                            <i class="fas fa-arrow-left"></i> Voltar para Forças
                        </button>
                        <div class="grid-container" id="grid-virtue-words"></div>
                    </div>
                </main>

                <!-- Tela: Teclado -->
                <main class="view-section" id="view-keyboard">
                    <div class="keyboard-container" id="keyboard-grid">
                        <!-- Teclas geradas via JS -->
                    </div>
                </main>

                <!-- Tela: Mídias Simples -->
                <main class="view-section" id="view-media">
                    <div class="media-header">
                        <button class="add-media-btn" id="btn-open-upload">
                            <i class="fas fa-plus-circle"></i> Adicionar Mídia
                        </button>
                        <p class="media-hint">Adicione seus próprios vídeos ou áudios aqui.</p>
                    </div>
                    <div class="grid-container" id="grid-media"></div>
                </main>

                <!-- Tela: Exercícios (Flashcards) -->
                <main class="view-section" id="view-exercises">
                    <div class="media-header">
                        <button class="add-media-btn" id="btn-open-exercise-upload" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);">
                            <i class="fas fa-plus-circle"></i> Nova Playlist
                        </button>
                        <p class="media-hint">Cards com múltiplos vídeos de aprendizado.</p>
                    </div>
                    <div class="grid-container" id="grid-exercises"></div>
                </main>
            </div>
        </div>
    </div>

    <!-- Modal de Upload de Mídia Simples -->
    <div class="modal-overlay" id="upload-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nova Mídia</h2>
                <button class="close-modal-btn" id="btn-close-upload"><i class="fas fa-times"></i></button>
            </div>
            <form id="upload-form">
                <div class="form-group">
                    <label for="media-title">Título</label>
                    <input type="text" id="media-title" required>
                </div>
                <div class="form-group">
                    <label for="media-file">Arquivo (Áudio ou Vídeo)</label>
                    <input type="file" id="media-file" accept="audio/*,video/*" required>
                </div>
                <div class="form-group">
                    <label for="media-color">Cor da Borda</label>
                    <select id="media-color">
                        <option value="color-orange">Laranja</option>
                        <option value="color-blue">Azul</option>
                        <option value="color-green">Verde</option>
                        <option value="color-red">Vermelho</option>
                        <option value="color-yellow">Amarelo</option>
                        <option value="color-pink">Rosa</option>
                        <option value="color-gray">Cinza</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="btn-cancel-upload">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Offline</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Upload de Exercício (Playlist com múltiplos vídeos) -->
    <div class="modal-overlay" id="upload-exercise-modal">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h2>Nova Playlist de Exercícios</h2>
                <button class="close-modal-btn" id="btn-close-exercise-upload"><i class="fas fa-times"></i></button>
            </div>
            <form id="upload-exercise-form">
                <div class="form-group">
                    <label for="exercise-title">Nome da Categoria (Ex: Sons do P)</label>
                    <input type="text" id="exercise-title" required placeholder="Ex: Categoria Alimentos">
                </div>
                
                <div id="exercise-items-container">
                    <!-- Primeiro item de vídeo obrigatório -->
                    <div class="exercise-item-block">
                        <div style="display: flex; justify-content: space-between;">
                            <h4>Vídeo 1</h4>
                        </div>
                        <div class="form-group">
                            <label>Palavra Escrita</label>
                            <input type="text" class="item-word" required placeholder="Ex: PÓ">
                        </div>
                        <div class="form-group">
                            <label>Link do Vídeo (Vimeo, Drive, YouTube, Figma)</label>
                            <input type="url" class="item-link" placeholder="Cole o link aqui..." required>
                        </div>
                        <div class="form-group">
                            <label>Imagem (Objeto)</label>
                            <input type="file" class="item-image" accept="image/*" required>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-secondary" id="btn-add-exercise-item" style="margin-bottom: 20px; width: 100%;">
                    <i class="fas fa-plus"></i> Adicionar outro vídeo a esta playlist
                </button>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="btn-cancel-exercise-upload">Cancelar</button>
                    <button type="submit" class="btn-primary" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);">Salvar Playlist</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Reprodução de Vídeo Simples -->
    <div class="modal-overlay" id="video-modal">
        <div class="modal-content video-modal-content">
            <div class="modal-header">
                <h2 id="video-modal-title">Vídeo</h2>
                <button class="close-modal-btn" id="btn-close-video"><i class="fas fa-times"></i></button>
            </div>
            <video id="video-player" controls autoplay></video>
        </div>
    </div>

    <!-- Tela de Apresentação (Exercícios - Fundo Branco com setas) -->
    <div class="presentation-modal" id="presentation-modal">
        <div class="presentation-top-bar">
            <span class="presentation-progress" id="presentation-progress">1 / 1</span>
            <button class="presentation-close-btn" id="btn-close-presentation"><i class="fas fa-times"></i> Fechar</button>
        </div>
        
        <button class="nav-arrow prev-arrow" id="btn-prev-presentation"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-arrow next-arrow" id="btn-next-presentation"><i class="fas fa-chevron-right"></i></button>
        
        <div class="presentation-layout">
            <div class="presentation-left">
                <h1 class="presentation-word" id="presentation-word-text">PÁ</h1>
                <iframe class="presentation-video" id="presentation-iframe" frameborder="0" allowfullscreen allow="autoplay; fullscreen"></iframe>
            </div>
            <div class="presentation-right">
                <img class="presentation-image" id="presentation-image" src="" alt="Objeto">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
